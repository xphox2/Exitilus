<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ANSI Rendering Test</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: monospace; }
    #terminal { width: 100vw; height: 90vh; }
    #info { padding: 5px 10px; font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div id="info"></div>
  <div id="terminal"></div>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
    const term = new Terminal({
      cols: 160,
      rows: 50,
      fontSize: 9,
      fontFamily: 'monospace',
      theme: { background: '#000000', foreground: '#ffffff' },
    });
    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.open(document.getElementById('terminal'));

    document.getElementById('info').textContent =
      'Terminal: ' + term.cols + 'x' + term.rows +
      ' | Font: ' + term.options.fontSize + 'px' +
      ' | Container: ' + document.getElementById('terminal').clientWidth + 'px';

    // TEST 1: Generate 5 rows of half-blocks with BOTH fg and bg colors
    // This tests if xterm.js properly renders ▀ with background colors
    let test1 = '\x1B[0m=== TEST 1: Generated half-blocks (5 rows x 160 cols) ===\r\n';
    for (let row = 0; row < 5; row++) {
      for (let col = 0; col < 160; col++) {
        const r = Math.floor(col / 160 * 255);
        const g = Math.floor(row / 5 * 200) + 55;
        // FOREGROUND (top half) = reddish, BACKGROUND (bottom half) = greenish
        test1 += '\x1B[38;2;' + r + ';50;50m\x1B[48;2;50;' + g + ';50m▀';
      }
      test1 += '\x1B[0m\r\n';
    }
    test1 += '\x1B[0mIf you see red tops and green bottoms with no black lines, TEST 1 PASSES\r\n\r\n';

    // TEST 2: Same but with color compression (skip unchanged colors)
    test1 += '=== TEST 2: With color compression (like img2ansi does) ===\r\n';
    for (let row = 0; row < 5; row++) {
      let prevFg = '';
      let prevBg = '';
      for (let col = 0; col < 160; col++) {
        const r = Math.floor(col / 160 * 255);
        const g = Math.floor(row / 5 * 200) + 55;
        const fgCode = '\x1B[38;2;' + r + ';50;50m';
        const bgCode = '\x1B[48;2;50;' + g + ';50m';
        let codes = '';
        if (fgCode !== prevFg) { codes += fgCode; prevFg = fgCode; }
        if (bgCode !== prevBg) { codes += bgCode; prevBg = bgCode; }
        test1 += codes + '▀';
      }
      test1 += '\x1B[0m\r\n';
    }
    test1 += '\x1B[0mIf identical to TEST 1, compression works fine\r\n\r\n';

    // TEST 3: Load the actual enhanced MAIN.ANS
    test1 += '=== TEST 3: Loading actual enhanced MAIN.ANS... ===\r\n';

    term.write(test1);

    fetch('/test-ansi').then(r => r.text()).then(data => {
      term.write('\x1B[2J\x1B[H'); // clear and show just the image
      term.write(data);
      // Show info after image
      const lines = data.split('\n');
      const vis = lines[0].replace(/\x1B\[[^A-Za-z]*[A-Za-z]/g, '').replace(/\r/g, '');
      term.write('\x1B[0m\r\nFile: ' + data.length + ' chars, ' + lines.length + ' lines, line width: ' + vis.length + '\r\n');
    }).catch(e => {
      term.write('\x1B[0mError loading: ' + e.message + '\r\n');
    });
  </script>
</body>
</html>
