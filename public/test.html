<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ANSI Test</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    body { margin: 0; background: #000; }
    #terminal { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
    const term = new Terminal({
      cols: 160,
      rows: 50,
      fontSize: 10,
      fontFamily: 'monospace',
      theme: { background: '#000' },
    });
    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.open(document.getElementById('terminal'));

    // Test 1: Simple colored blocks - does 160 fit?
    let test = '';
    for (let i = 0; i < 160; i++) {
      const r = Math.floor(i / 160 * 255);
      test += '\x1B[38;2;' + r + ';100;100m▀';
    }
    test += '\x1B[0m\r\n';
    test += 'Cols: ' + term.cols + '  If the line above is one row with no wrap, 160 cols works.\r\n';
    test += '\r\n';

    term.write(test);

    // Test 2: Load actual enhanced ANSI via WebSocket
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    term.write('Connecting to load enhanced ANSI...\r\n');

    // Fetch the raw file via a simple endpoint
    fetch('/test-ansi').then(r => r.text()).then(data => {
      term.write('\x1B[2J\x1B[H'); // clear
      term.write(data);
      term.write('\x1B[0m\r\nDone. Lines in file: ' + data.split('\n').length + '\r\n');
    }).catch(e => {
      term.write('Error: ' + e.message + '\r\n');
    });
  </script>
</body>
</html>
