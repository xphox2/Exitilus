<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ANSI Rendering Test</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: monospace; }
    #terminal { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.18.0/lib/addon-webgl.min.js"></script>
  <script>
    const term = new Terminal({
      customGlyphs: true,
      fontSize: 9,
      fontFamily: 'monospace',
      theme: { background: '#000000' },
    });
    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.open(document.getElementById('terminal'));
    try { term.loadAddon(new WebglAddon.WebglAddon()); } catch(e) {}
    fit.fit();

    term.write('Terminal: ' + term.cols + 'x' + term.rows + '\r\n\r\n');
    term.write('Loading enhanced MAIN.ANS...\r\n');

    fetch('/test-ansi').then(r => r.text()).then(data => {
      term.write('\x1B[2J\x1B[H');
      term.write(data);
    }).catch(e => {
      term.write('Error: ' + e.message + '\r\n');
    });
  </script>
</body>
</html>
